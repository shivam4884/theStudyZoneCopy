<!-- public/404.html -->
<!-- This file catches all 404s on GitHub Pages and redirects
     them back to index.html so React Router can handle routing -->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>The Study Zone</title>
    <script>
      // This script takes the current URL, converts it to a query
      // parameter, and redirects to the homepage so React can handle it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
